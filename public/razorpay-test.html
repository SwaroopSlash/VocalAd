<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Isolated Diagnostic | VocalAd.ai</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .log-entry { font-family: monospace; font-size: 0.75rem; border-left: 2px solid #4f46e5; padding-left: 0.5rem; margin-bottom: 0.25rem; }
        .error { color: #f87171; border-color: #f87171; }
        .success { color: #34d399; border-color: #34d399; }
        .info { color: #818cf8; border-color: #818cf8; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-3xl mx-auto space-y-8">
        <div class="flex items-center gap-4 border-b border-white/10 pb-6">
            <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">Razorpay Diagnostic Suite</h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Isolated Integration Test v1.1</p>
            </div>
        </div>

        <div class="bg-slate-900/50 border border-white/5 rounded-3xl p-6 space-y-6">
            <div class="grid gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Target Environment</label>
                    <div class="flex gap-4">
                        <span class="px-3 py-1 bg-indigo-500/10 text-indigo-400 rounded-full text-[10px] font-bold border border-indigo-500/20">Project: advocalize</span>
                        <span class="px-3 py-1 bg-indigo-500/10 text-indigo-400 rounded-full text-[10px] font-bold border border-indigo-500/20">Region: us-central1</span>
                    </div>
                </div>

                <div class="pt-4 flex flex-col md:flex-row gap-4">
                    <button id="btn-init" class="flex-1 px-6 py-4 bg-white text-slate-950 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-200 transition-all">
                        1. Initialize Core
                    </button>
                    <button id="btn-order" disabled class="flex-1 px-6 py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-500 disabled:opacity-30 transition-all">
                        2. Create Order (₹10)
                    </button>
                    <button id="btn-pay" disabled class="flex-1 px-6 py-4 bg-emerald-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-emerald-500 disabled:opacity-30 transition-all">
                        3. Open Payment UI
                    </button>
                </div>
            </div>
        </div>

        <div class="space-y-2">
            <div id="logs" class="bg-black/50 border border-white/5 rounded-2xl p-6 h-80 overflow-y-auto space-y-1 shadow-inner">
                <div class="log-entry info">Diagnostic Suite v1.1 Ready. Click 'Initialize Core' to begin.</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const log = (msg, type = 'info') => {
            const container = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        };

        let auth, functions, currentOrderId;

        const firebaseConfig = {
            apiKey: "AIzaSyCU4-sfVJUrz8iBsMKlvDdnzXu_UjoLD5s",
            authDomain: "advocalize.firebaseapp.com",
            projectId: "advocalize",
            storageBucket: "advocalize.appspot.com",
            messagingSenderId: "911571947699",
            appId: "1:911571947699:web:355d78d49a5b3a3c944883"
        };

        document.getElementById('btn-init').onclick = async () => {
            try {
                log("Starting Core Initialization...");
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                functions = getFunctions(app, "us-central1");

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        log(`AUTH SUCCESS: Active User UID ${user.uid}`, "success");
                        document.getElementById('btn-order').disabled = false;
                        document.getElementById('btn-init').innerText = "✓ System Ready";
                    } else {
                        log("AUTH STATUS: No session found. Creating secure guest session...");
                        try {
                            await signInAnonymously(auth);
                        } catch (ae) {
                            log(`AUTH CRITICAL ERROR: ${ae.message}`, "error");
                        }
                    }
                });
                
                log("Firebase Services Mounted.", "success");
                document.getElementById('btn-init').disabled = true;
            } catch (err) {
                log(`MOUNT ERROR: ${err.message}`, "error");
            }
        };

        document.getElementById('btn-order').onclick = async () => {
            try {
                log("REQUESTING ORDER: Calling createOrderV2...");
                const createOrder = httpsCallable(functions, 'createOrderV2');
                const result = await createOrder({ amount: 10, planId: 'single' });
                
                if (result?.data?.orderId) {
                    currentOrderId = result.data.orderId;
                    log(`ORDER CREATED: ${currentOrderId}`, "success");
                    document.getElementById('btn-pay').disabled = false;
                } else {
                    throw new Error("Server returned an empty order payload.");
                }
            } catch (err) {
                log(`BACKEND ERROR: ${err.message}`, "error");
            }
        };

        document.getElementById('btn-pay').onclick = () => {
            try {
                log("INVOKING RAZORPAY: Checking SDK...");
                if (!window.Razorpay) throw new Error("Razorpay Global SDK (v1/checkout.js) not found in DOM.");

                const options = {
                    key: "rzp_live_SfCZvOMFGefR8r",
                    amount: 1000,
                    currency: "INR",
                    name: "VocalAd Production Test",
                    description: "End-to-End Diagnostic (₹10)",
                    order_id: currentOrderId,
                    handler: function(response) {
                        log(`PAYMENT SUCCESS: ID ${response.razorpay_payment_id}`, "success");
                        alert("Diagnostic Success! Credits will be added by webhook.");
                    },
                    prefill: { email: "tester@vocalad.ai" },
                    theme: { color: "#4f46e5" }
                };

                log("Executing rzp.open()...");
                const rzp = new window.Razorpay(options);
                rzp.on('payment.failed', (resp) => log(`UI ERROR: ${resp.error.description}`, "error"));
                rzp.open();
                log("Popup command executed. Await browser response.");
            } catch (err) {
                log(`SDK ERROR: ${err.message}`, "error");
            }
        };
    </script>
</body>
</html>
